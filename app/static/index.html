<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Parallax — digital footprint finder</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --muted:#8b949e;
          --accent:#2f81f7; --ok:#3fb950; --warn:#d29922; --err:#f85149; --orange:#db6d28; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:20px 24px; border-bottom:1px solid var(--border); }
  h1 { margin:0; font-size:20px; }
  h1 span { color:var(--muted); font-weight:400; font-size:13px; }
  main { max-width:1000px; margin:0 auto; padding:24px; }
  .search { display:flex; gap:8px; margin-bottom:16px; }
  input[type=text] { flex:1; padding:10px 12px; background:var(--panel); border:1px solid var(--border);
                     border-radius:8px; color:var(--fg); font-size:15px; }
  button { padding:10px 18px; background:var(--accent); color:#fff; border:0; border-radius:8px;
           cursor:pointer; font-size:15px; }
  button:disabled { opacity:.5; cursor:default; }
  button.ghost { background:transparent; border:1px solid var(--border); color:var(--fg); }
  button.warn { background:var(--orange); }
  .bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px; color:var(--muted); font-size:13px; }
  .pill { padding:2px 8px; border:1px solid var(--border); border-radius:999px; }
  .pill.on { color:var(--ok); border-color:var(--ok); }
  .pill.off { color:var(--err); border-color:var(--err); }
  .status { min-height:20px; color:var(--muted); font-size:13px; margin-bottom:8px; }
  .actions { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  .actions input[type=text] { flex:0 1 200px; padding:7px 10px; font-size:13px; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); font-size:14px; vertical-align:top; }
  th { color:var(--muted); font-weight:600; position:sticky; top:0; background:var(--bg); }
  td a { color:var(--accent); text-decoration:none; word-break:break-all; }
  .src { font-size:12px; color:var(--muted); }
  .tag { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; background:#21262d; color:var(--muted); }
  .about { font-size:13px; color:var(--fg); }
  tr.breach .about { color:var(--err); font-weight:600; }
  tr.breach td { background:rgba(248,81,73,.12); }
  tr.breach .site-badge { color:var(--err); font-weight:600; }
  tr.phone td { background:rgba(47,129,247,.08); }
  .empty { color:var(--muted); padding:40px; text-align:center; }
  /* explore further */
  #explore { margin-top:24px; }
  #explore h3 { font-size:16px; margin:0 0 4px; cursor:pointer; }
  #explore .sub { color:var(--muted); font-size:12px; margin-bottom:12px; }
  .exp-cat { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;
             margin:14px 0 6px; border-bottom:1px solid var(--border); padding-bottom:4px; }
  .exp-item { padding:6px 0; }
  .exp-item .nm { font-weight:600; }
  .exp-item .nm a { color:var(--accent); text-decoration:none; }
  .exp-item .desc { color:var(--muted); font-size:13px; }
  .price { font-size:10px; padding:1px 6px; border-radius:999px; border:1px solid var(--border); margin-left:6px; }
  .price.free { color:var(--ok); border-color:var(--ok); }
  .price.paid, .price.freemium { color:var(--warn); border-color:var(--warn); }
  .reg { font-size:10px; color:var(--muted); margin-left:4px; }
  .spin { display:inline-block; width:12px; height:12px; border:2px solid var(--border);
          border-top-color:var(--accent); border-radius:50%; animation:s .7s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
  /* constellation map */
  .galaxy-wrap { position:relative; margin-bottom:16px; border:1px solid var(--border);
                 border-radius:12px; overflow:hidden;
                 background:radial-gradient(ellipse at 50% 40%, #10182b 0%, #080b14 70%, #05070d 100%); }
  #galaxy { display:block; width:100%; height:360px; }
  .galaxy-hud { position:absolute; top:10px; left:12px; font-size:12px; color:var(--muted);
                pointer-events:none; text-shadow:0 0 8px #000; }
  .galaxy-hud b { color:var(--fg); }
  .galaxy-toggle { position:absolute; top:8px; right:10px; }
  .tip { position:fixed; z-index:20; pointer-events:none; background:rgba(13,17,23,.95);
         border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:12px;
         color:var(--fg); max-width:260px; display:none; box-shadow:0 4px 20px rgba(0,0,0,.5); }
  .tip .t-site { font-weight:600; } .tip .t-sub { color:var(--muted); }
  /* removal modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; z-index:10;
             overflow:auto; padding:40px 16px; }
  .overlay.show { display:block; }
  .modal { max-width:820px; margin:0 auto; background:var(--panel); border:1px solid var(--border);
           border-radius:12px; padding:24px; }
  .modal h2 { margin:0 0 4px; font-size:18px; }
  .disclaimer { background:rgba(210,153,34,.1); border:1px solid var(--warn); color:var(--fg);
                padding:10px 12px; border-radius:8px; font-size:13px; margin:12px 0 16px; }
  .step { border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:10px; }
  .step-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .step-head b { font-size:15px; }
  .diff { padding:1px 8px; border-radius:999px; font-size:11px; font-weight:600; }
  .diff.easy { color:var(--ok); border:1px solid var(--ok); }
  .diff.medium { color:var(--warn); border:1px solid var(--warn); }
  .diff.hard { color:var(--orange); border:1px solid var(--orange); }
  .diff.impossible, .diff.unknown { color:var(--err); border:1px solid var(--err); }
  .step .notes { color:var(--muted); font-size:13px; margin:6px 0; }
  .step .links { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
  .step .links a, .step .links button { font-size:12px; padding:5px 10px; }
  .modal-close { float:right; }
</style>
</head>
<body>
<header>
  <h1>✦ Parallax <span>— triangulate a digital footprint · username · email · phone · name</span></h1>
</header>
<main>
  <div class="search">
    <input id="q" type="text" placeholder="username, email, +91 phone, or full name" autofocus />
    <button id="go">Search</button>
    <button id="export" class="ghost" disabled>Export JSON</button>
  </div>
  <div class="bar" id="engines"></div>
  <div class="galaxy-wrap" id="galaxyWrap" style="display:none">
    <canvas id="galaxy"></canvas>
    <div class="galaxy-hud" id="galaxyHud"></div>
    <button class="ghost galaxy-toggle" id="galaxyToggle">Hide map</button>
  </div>
  <div class="status" id="status"></div>
  <div class="actions" id="actions" style="display:none">
    <label><input type="checkbox" id="selall" /> select all accounts</label>
    <input type="text" id="requester" placeholder="your name (signs erasure request)" />
    <button class="warn" id="removeBtn" disabled>Removal plan (0)</button>
  </div>
  <table>
    <thead><tr><th style="width:28px"></th><th>Site</th><th>Match</th><th>Engine</th><th>Info</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty">Enter an identifier and hit Search.</div>
  <div id="explore"></div>
</main>
<div class="tip" id="tip"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="ghost modal-close" id="closeModal">Close</button>
    <h2>🧹 Removal Assistant</h2>
    <div class="disclaimer" id="disclaimer"></div>
    <div id="steps"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let results = [];
let detectedKind = null;
let exploreFree = false;

/* ---------------- Constellation map ---------------- */
const Galaxy = (() => {
  const cv = $("#galaxy"), ctx = cv.getContext("2d");
  let W = 0, H = 0, cx = 0, cy = 0, dpr = 1;
  let bg = [];                 // background drifting stars
  let hubs = new Map();        // engine name -> hub node
  let nodes = [];              // finding nodes
  let center = null;           // query node
  let rot = 0, raf = null, running = false;
  const ENGINE_COLORS = { maigret:"#7c9cff", sherlock:"#2f81f7", gosearch:"#3fb950",
                          holehe:"#d29922", phoneinfoga:"#56d4dd" };

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = cv.clientWidth; H = cv.clientHeight; cx = W/2; cy = H/2;
    cv.width = W*dpr; cv.height = H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function seedBg() {
    bg = Array.from({length: 150}, (_,i) => ({
      x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.4+0.2,
      tw: Math.random()*Math.PI*2, sp: 0.002+Math.random()*0.006,
      dx: (Math.random()-0.5)*0.05, dy:(Math.random()-0.5)*0.05 }));
  }
  function reset(query) {
    resize(); seedBg(); hubs.clear(); nodes = []; rot = 0;
    center = { label: query, a: 0, r: 0, alpha: 0, tAlpha: 1, pop: 0 };
    if (!running) { running = true; loop(); }
  }
  function hubFor(name) {
    if (hubs.has(name)) return hubs.get(name);
    const idx = hubs.size;
    const hub = { name, label: name, a: 0, baseA: 0, r: Math.min(W,H)*0.24,
                  color: ENGINE_COLORS[name]||"#8b949e", alpha:0, tAlpha:1, pop:0 };
    hubs.set(name, hub);
    // redistribute hub angles evenly as new ones arrive
    let i = 0, n = hubs.size;
    for (const h of hubs.values()) { h.baseA = (i/n)*Math.PI*2 - Math.PI/2; i++; }
    return hub;
  }
  function addEngine(name) { hubFor(name); }
  function addFinding(f) {
    const hub = f.source ? hubFor(f.source) : null;
    const band = Math.min(W,H)*0.30 + Math.random()*Math.min(W,H)*0.16;
    const spread = 0.55;
    const baseA = (hub ? hub.baseA : Math.random()*Math.PI*2) + (Math.random()-0.5)*spread;
    nodes.push({
      f, hub, baseA, r: band, alpha:0, tAlpha:1, pop:0,
      breach: f.kind === "breach",
      color: f.kind==="breach" ? "#f85149" : (hub? hub.color : "#8b949e"),
      rad: f.kind==="breach" ? 4.2 : 2.4, tw: Math.random()*Math.PI*2,
    });
    updateHud();
  }
  function updateHud() {
    const b = nodes.filter(n=>n.breach).length;
    $("#galaxyHud").innerHTML = `<b>${nodes.length}</b> nodes mapped · <b>${hubs.size}</b> engines`
      + (b?` · <span style="color:#f85149">${b} breach</span>`:``);
  }
  function pos(node) { const a = node.baseA + rot; return [cx + Math.cos(a)*node.r, cy + Math.sin(a)*node.r]; }

  function loop() {
    rot += 0.0009;
    ctx.clearRect(0,0,W,H);
    // background stars
    for (const s of bg) {
      s.tw += s.sp; s.x=(s.x+s.dx+W)%W; s.y=(s.y+s.dy+H)%H;
      const a = 0.35 + Math.sin(s.tw)*0.3;
      ctx.globalAlpha = Math.max(0,a); ctx.fillStyle = "#cdd9ff";
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (!center) { raf = requestAnimationFrame(loop); return; }
    center.alpha += (center.tAlpha-center.alpha)*0.08;
    // edges center->hub
    for (const h of hubs.values()) {
      h.alpha += (h.tAlpha-h.alpha)*0.08; h.pop += (1-h.pop)*0.06;
      const [hx,hy] = pos({baseA:h.baseA, r:h.r});
      const g = ctx.createLinearGradient(cx,cy,hx,hy);
      g.addColorStop(0, "rgba(120,150,255,0.35)"); g.addColorStop(1, hexA(h.color,0.15));
      ctx.strokeStyle = g; ctx.lineWidth = 1.1; ctx.globalAlpha = h.alpha;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(hx,hy); ctx.stroke();
    }
    // edges hub->finding + finding stars
    for (const n of nodes) {
      n.alpha += (n.tAlpha-n.alpha)*0.09; n.pop += (1-n.pop)*0.05; n.tw += 0.05;
      const [nx,ny] = pos(n);
      const anchor = n.hub ? pos({baseA:n.hub.baseA, r:n.hub.r}) : [cx,cy];
      ctx.globalAlpha = n.alpha*0.5; ctx.strokeStyle = hexA(n.color,0.5); ctx.lineWidth = 0.7;
      ctx.beginPath(); ctx.moveTo(anchor[0],anchor[1]); ctx.lineTo(nx,ny); ctx.stroke();
      const pulse = n.breach ? (1+Math.sin(n.tw)*0.35) : 1;
      const rr = n.rad*n.pop*pulse;
      ctx.globalAlpha = n.alpha;
      ctx.shadowColor = n.color; ctx.shadowBlur = n.breach?16:8;
      ctx.fillStyle = n.color; ctx.beginPath(); ctx.arc(nx,ny,rr,0,7); ctx.fill();
      ctx.shadowBlur = 0;
      n._sx = nx; n._sy = ny; n._sr = Math.max(rr,6); // hit box
    }
    // hubs on top
    for (const h of hubs.values()) {
      const [hx,hy] = pos({baseA:h.baseA, r:h.r});
      ctx.globalAlpha = h.alpha;
      ctx.shadowColor = h.color; ctx.shadowBlur = 12;
      ctx.fillStyle = h.color; ctx.beginPath(); ctx.arc(hx,hy,4.5*h.pop,0,7); ctx.fill();
      ctx.shadowBlur = 0; ctx.globalAlpha = h.alpha*0.9;
      ctx.fillStyle = "#c9d4ee"; ctx.font = "11px system-ui"; ctx.textAlign="center";
      ctx.fillText(h.label, hx, hy-9);
      h._sx=hx; h._sy=hy;
    }
    // center query star
    ctx.globalAlpha = center.alpha;
    const cr = 6 + Math.sin(rot*6)*1.2;
    ctx.shadowColor = "#eaf2ff"; ctx.shadowBlur = 22;
    ctx.fillStyle = "#eaf2ff"; ctx.beginPath(); ctx.arc(cx,cy,cr,0,7); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle="#eaf2ff"; ctx.font="600 12px system-ui"; ctx.textAlign="center";
    ctx.fillText(center.label, cx, cy+cr+16);
    ctx.globalAlpha = 1;
    raf = requestAnimationFrame(loop);
  }
  function hexA(hex, a) {
    const n = parseInt(hex.slice(1),16);
    return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;
  }
  // interaction
  cv.addEventListener("mousemove", e => {
    const rect = cv.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
    let hit = null;
    for (const n of nodes) if (n._sx!=null && Math.hypot(n._sx-mx,n._sy-my) <= n._sr+4) { hit=n; break; }
    const tip = $("#tip");
    if (hit) {
      tip.style.display="block"; tip.style.left=(e.clientX+12)+"px"; tip.style.top=(e.clientY+12)+"px";
      tip.innerHTML = `<div class="t-site">${hit.breach?'⚠ ':''}${escv(hit.f.site)}</div>`
        + `<div class="t-sub">${escv(hit.f.source)} · ${escv(hit.f.value||'')}</div>`
        + (hit.f.extra&&(hit.f.extra.about||hit.f.extra.alert)?`<div class="t-sub">${escv(hit.f.extra.about||hit.f.extra.alert)}</div>`:``);
      cv.style.cursor = hit.f.url ? "pointer":"default";
    } else { tip.style.display="none"; cv.style.cursor="default"; }
  });
  cv.addEventListener("mouseleave", ()=> $("#tip").style.display="none");
  cv.addEventListener("click", e => {
    const rect = cv.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
    for (const n of nodes) if (n._sx!=null && Math.hypot(n._sx-mx,n._sy-my)<=n._sr+4 && n.f.url) { window.open(n.f.url,"_blank"); break; }
  });
  function escv(s){ return String(s??"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  window.addEventListener("resize", () => { if (running) resize(); });
  return { reset, addEngine, addFinding };
})();

async function loadEngines() {
  const es = await (await fetch("/api/engines")).json();
  $("#engines").innerHTML = "Engines: " + es.map(e =>
    `<span class="pill ${e.available?'on':'off'}" title="${e.accepts.join(', ')}">${e.name}${e.available?'':' (missing)'}</span>`
  ).join(" ");
}

function selectedFindings() {
  return [...document.querySelectorAll(".rowchk:checked")].map(c => results[+c.dataset.idx]);
}
function refreshRemoveBtn() {
  const n = document.querySelectorAll(".rowchk:checked").length;
  $("#removeBtn").textContent = `Removal plan (${n})`;
  $("#removeBtn").disabled = n === 0;
}

function addRow(f) {
  const idx = results.length;
  results.push(f);
  const site = f.url ? `<a href="${f.url}" target="_blank" rel="noopener">${f.site}</a>` : f.site;
  const extra = { ...(f.extra||{}) };
  const about = extra.about || extra.alert; delete extra.about; delete extra.alert;
  const tags = Object.entries(extra).slice(0,3)
    .map(([k,v]) => `<span class="tag">${k}: ${String(v).slice(0,40)}</span>`).join(" ");
  const info = (about ? `<span class="about">${about}</span> ` : "") + tags;
  const tr = document.createElement("tr");
  if (f.kind === "breach") tr.className = "breach";
  else if (f.kind === "phone") tr.className = "phone";
  const badge = f.kind === "breach" ? `<span class="site-badge">⚠ ${site}</span>` : site;
  // only account findings are selectable for removal (breach/phone aren't accounts you delete)
  const chk = (f.kind === "account")
    ? `<input type="checkbox" class="rowchk" data-idx="${idx}" />` : "";
  tr.innerHTML = `<td>${chk}</td><td>${badge}</td><td>${f.value||""}</td><td class="src">${f.source}</td><td>${info}</td>`;
  $("#rows").appendChild(tr);
  $("#empty").style.display = "none";
  $("#export").disabled = false;
  $("#actions").style.display = "flex";
}

async function run() {
  const q = $("#q").value.trim();
  if (!q) return;
  results = []; $("#rows").innerHTML = ""; $("#export").disabled = true;
  $("#actions").style.display = "none"; $("#selall").checked = false; refreshRemoveBtn();
  $("#explore").innerHTML = ""; detectedKind = null;
  $("#empty").style.display = "none";
  $("#galaxyWrap").style.display = "block"; Galaxy.reset(q);
  $("#go").disabled = true;
  $("#status").innerHTML = `<span class="spin"></span> submitting…`;

  const { job_id } = await (await fetch("/api/search", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ query: q })
  })).json();

  const es = new EventSource(`/api/stream/${job_id}`);
  es.onmessage = ev => {
    const e = JSON.parse(ev.data);
    if (e.type === "detected") { detectedKind = e.kind; $("#status").innerHTML = `<span class="spin"></span> detected <b>${e.kind}</b> — mapping the galaxy…`; }
    else if (e.type === "engine_start") { Galaxy.addEngine(e.engine); $("#status").innerHTML = `<span class="spin"></span> ${e.engine} scanning <b>${e.target}</b>…`; }
    else if (e.type === "engine_skip") $("#status").innerHTML += ` · ${e.engine} skipped (${e.reason})`;
    else if (e.type === "pivot") $("#status").innerHTML = `<span class="spin"></span> pivot → <b>${e.handle}</b>`;
    else if (e.type === "finding") { addRow(e.finding); Galaxy.addFinding(e.finding); }
    else if (e.type === "done") { $("#status").textContent = `Done — ${e.count} unique results.`; loadExplore(); }
    else if (e.type === "fatal") { $("#status").textContent = `Error: ${e.error}`; }
  };
  es.addEventListener("end", () => { es.close(); $("#go").disabled = false;
    if (!results.length && !$("#status").textContent.startsWith("Error")) {
      $("#empty").style.display = "block"; $("#empty").textContent = "No results found."; }
  });
  es.onerror = () => { es.close(); $("#go").disabled = false; };
}

function esc(s) { return String(s??"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadExplore() {
  if (!detectedKind) return;
  const data = await (await fetch(`/api/explore/${detectedKind}?free_only=${exploreFree}`)).json();
  const groups = data.groups.map(g => `
    <div class="exp-cat">${esc(g.category)}</div>
    ${g.resources.map(r => `
      <div class="exp-item">
        <div class="nm"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.name)} ↗</a>
          <span class="price ${r.pricing}">${esc(r.pricing)}</span>
          ${r.registration ? '<span class="reg">· signup</span>' : ''}
          ${r.dork ? '<span class="reg">· google-dork</span>' : ''}</div>
        <div class="desc">${esc(r.bestFor || r.description)}</div>
      </div>`).join("")}`).join("");
  $("#explore").innerHTML = `
    <h3 id="expHead">🧭 Explore Further — ${data.count} curated OSINT tools for a ${esc(detectedKind)} ▾</h3>
    <div class="sub">
      Manual resources from the <a href="https://osintframework.com" target="_blank" rel="noopener">OSINT Framework</a>
      — not auto-run, open to investigate further.
      <label style="margin-left:10px"><input type="checkbox" id="expFree" ${exploreFree?'checked':''}/> free & no-signup only</label>
    </div>
    <div id="expBody">${groups}</div>`;
  $("#expHead").onclick = () => { const b=$("#expBody"); b.style.display = b.style.display==='none'?'block':'none'; };
  $("#expFree").onchange = e => { exploreFree = e.target.checked; loadExplore(); };
}

function mailto(em) {
  return `mailto:${encodeURIComponent(em.to)}?subject=${encodeURIComponent(em.subject)}&body=${encodeURIComponent(em.body)}`;
}

async function buildRemoval() {
  const findings = selectedFindings();
  if (!findings.length) return;
  $("#removeBtn").disabled = true; $("#removeBtn").textContent = "Building…";
  const plan = await (await fetch("/api/removal", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ findings, requester: $("#requester").value.trim() })
  })).json();

  $("#disclaimer").textContent = plan.disclaimer;
  $("#steps").innerHTML = plan.steps.map(s => `
    <div class="step">
      <div class="step-head">
        <b>${esc(s.site)}</b>
        <span class="diff ${s.difficulty}">${s.difficulty}</span>
        ${s.profile_url ? `<a href="${esc(s.profile_url)}" target="_blank" rel="noopener">profile ↗</a>` : ""}
      </div>
      <div class="notes">${esc(s.notes)}</div>
      <div class="links">
        ${s.delete_url ? `<a class="button ghost" href="${esc(s.delete_url)}" target="_blank" rel="noopener">🗑 Delete page ↗</a>` : ""}
        <a class="button ghost" href="${mailto(s.erasure_email)}">✉ Send erasure request</a>
        <button class="ghost" data-copy="${encodeURIComponent(s.erasure_email.body)}">Copy request text</button>
      </div>
    </div>`).join("");

  $("#steps").querySelectorAll("button[data-copy]").forEach(b =>
    b.onclick = () => { navigator.clipboard.writeText(decodeURIComponent(b.dataset.copy));
                        b.textContent = "Copied ✓"; setTimeout(()=>b.textContent="Copy request text",1500); });
  $("#overlay").classList.add("show");
  $("#removeBtn").disabled = false; refreshRemoveBtn();
}

$("#rows").addEventListener("change", e => { if (e.target.classList.contains("rowchk")) refreshRemoveBtn(); });
$("#selall").onchange = e => { document.querySelectorAll(".rowchk").forEach(c => c.checked = e.target.checked); refreshRemoveBtn(); };
$("#removeBtn").onclick = buildRemoval;
$("#closeModal").onclick = () => $("#overlay").classList.remove("show");
$("#overlay").onclick = e => { if (e.target.id === "overlay") $("#overlay").classList.remove("show"); };

$("#export").onclick = () => {
  const blob = new Blob([JSON.stringify(results, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "osint-results.json"; a.click();
};
$("#go").onclick = run;
$("#q").addEventListener("keydown", e => { if (e.key === "Enter") run(); });
$("#galaxyToggle").onclick = () => {
  const c = $("#galaxy");
  const hidden = c.style.display === "none";
  c.style.display = hidden ? "block" : "none";
  $("#galaxyToggle").textContent = hidden ? "Hide map" : "Show map";
};
loadEngines();
</script>
</body>
</html>
