name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # The offline unit tests only need the app's Python deps — not the OSINT
        # engine CLIs (sherlock/maigret/...) or the Go binaries, which are network
        # tools exercised only at runtime.
        run: |
          python -m pip install --upgrade pip
          pip install "pydantic>=2.6" psutil phonenumbers pytest

      - name: Run tests
        # `python -m pytest` puts the repo root on sys.path so `import app` works
        run: python -m pytest tests/ -q
